version: '3.8'

services:
  triposr-cpu:
    image: ghcr.io/claudao01/triposr-docker-deployment:main
    ports:
      - "${PORT:-7860}:7860"
    volumes:
      - hf_cache:/root/.cache/huggingface
      - u2net_cache:/root/.u2net
      - torch_cache:/root/.cache/torch
    deploy:
      resources:
        limits:
          memory: ${MEMORY_LIMIT:-12g}
        reservations:
          memory: ${MEMORY_RESERVATION:-6g}

volumes:
  hf_cache:
  u2net_cache:
  torch_cache: