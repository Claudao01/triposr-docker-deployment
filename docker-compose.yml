version: '3.8'

services:
  triposr-cpu:
    image: ghcr.io/claudao01/triposr-docker-deployment:main
    ports:
      - "${PORT:-7860}:7860"
    volumes:
      - hf_cache:/root/.cache/huggingface
    # Legacy compatibility (Ensures resource limits in standalone Docker Compose V1)
    mem_limit: ${MEMORY_LIMIT:-12g}
    mem_reservation: ${MEMORY_RESERVATION:-6g}
    # Modern compatibility (Used by Docker Swarm and Compose V2)
    deploy:
      resources:
        limits:
          memory: ${MEMORY_LIMIT:-12g}
        reservations:
          memory: ${MEMORY_RESERVATION:-6g}

volumes:
  hf_cache: